<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="一个交互式的儿童双语学习工具，支持语音输入和实时翻译。">
    <title>儿童语言学习乐园</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%);
        }
        #container {
            width: 95vw;
            max-width: 95vw;
            height: 95vh; /* 关键：限制容器总高度 */
            background: white;
            padding: 1rem;
            border-radius: 20px;
            box-sizing: border-box;
            display: flex; /* 关键：启用Flexbox */
            flex-direction: column; /* 关键：垂直排列 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #007bff;
            font-size: 3rem; /* 增大标题字号 */
        }
        p {
            color: #555;
            font-size: 1.4rem; /* 增大段落字号 */
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 18px 35px; /* 增大按钮尺寸 */
            font-size: 1.4rem; /* 增大按钮字号 */
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin: 10px;
        }
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #stop-btn {
            background-color: #ff4136;
        }
        #stop-btn:hover {
            background-color: #d4362d;
        }
        #volume-visualizer {
            height: 10px;
            width: 0;
            background-color: #007bff;
            border-radius: 5px;
            margin: 20px auto;
            transition: width 0.1s;
        }
        #mic-btn.recording + #volume-visualizer {
             width: 100%;
             transform-origin: left;
        }
        #result {
            width: 100%; /* 宽度占满容器 */
            flex-grow: 1; /* 关键：占据所有剩余垂直空间 */
            margin-top: 1rem;
            text-align: left;
            padding: 1.5rem;
            border: 2px dashed #ddd;
            border-radius: 10px;
            overflow-y: auto;
            box-sizing: border-box;
            /* 确保flex布局下的高度计算正确 */
            min-height: 0;
            background-color: #f8f9fa;
            font-size: 1.5rem; /* 增大结果区域字号 */
        }
        #status {
            margin-top: 1rem;
            color: #666;
            font-size: 1.1rem;
            height: 20px;
        }
    </style>
</head>
<body>

    <div id="container">
        <h1>语言乐园</h1>
        <p>点击按钮开始或结束录音</p>
        <div id="button-container">
            <button id="start-btn" class="btn">开始录音</button>
            <button id="stop-btn" class="btn" style="display: none;">结束录音</button>
        </div>
        <div id="volume-visualizer"></div>
        <div id="status"></div>
        <div id="result">
            <!-- 学习卡片会出现在这里 -->
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        const volumeVisualizer = document.getElementById('volume-visualizer');

        // 检查浏览器是否支持语音识别
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusDiv.textContent = "抱歉，您的浏览器不支持语音识别功能。";
            micBtn.disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = true; // 持续识别
            recognition.lang = 'zh-CN, en-US'; // 同时支持中英文
            recognition.interimResults = true; // 需要临时结果以实时显示

            let silenceTimer;
            let finalTranscript = '';

            let audioContext;
            let analyser;
            let microphone;
            let javascriptNode;
            let recognitionTimeout;

            startBtn.addEventListener('click', startRecognition);
            stopBtn.addEventListener('click', stopRecognition);

            function startRecognition() {
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                statusDiv.textContent = "请说话...（2秒无声将自动结束）";
                resultDiv.innerHTML = "";
                finalTranscript = '';
                recognition.start();
                startVolumeVisualization();
            }

            function stopRecognition() {
                // 检查是否仍在录音状态，避免重复执行
                if (stopBtn.style.display !== 'none') {
                    startBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                    statusDiv.textContent = "录音结束，正在处理...";
                    recognition.stop();
                    stopVolumeVisualization();
                    clearTimeout(silenceTimer);
                }
            }

            recognition.onresult = (event) => {
                clearTimeout(silenceTimer); // 接收到语音，重置计时器

                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // 实时显示最终和临时的结果
                resultDiv.innerHTML = finalTranscript + '<i style="color:grey;">' + interimTranscript + '</i>';

                // 如果仍在录音，设置2秒静默超时
                // 如果仍在录音，设置2秒静默超时
                if (stopBtn.style.display !== 'none') {
                    silenceTimer = setTimeout(() => {
                        statusDiv.textContent = "检测到静默，自动结束录音。";
                        stopRecognition();
                    }, 1000);
                }
            };

            recognition.onerror = (event) => {
                clearTimeout(recognitionTimeout); // 发生错误，清除超时
                let errorMessage = `语音识别错误: ${event.error}`;
                if (event.error === 'aborted') {
                    errorMessage = "没有听到声音哦，请再试一次。";
                } else if (event.error === 'no-speech') {
                    errorMessage = "完全没有听到声音呢，请按住按钮说话。";
                }
                statusDiv.textContent = errorMessage;
                stopVolumeVisualization();
            };

            recognition.onend = () => {
                // 确保按钮状态在识别结束后正确
                if (stopBtn.style.display !== 'none') {
                    startBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                }

                if (finalTranscript) {
                    statusDiv.textContent = `识别完成: "${finalTranscript}"，正在处理...`;
                    processTranscript(finalTranscript);
                } else {
                    statusDiv.textContent = "好像没听到声音，可以点击麦克风再说一次吗？";
                    resultDiv.innerHTML = ""; // 清空可能存在的临时文本
                }
            };

            async function processTranscript(text) {
                try {
                    // Vercel 部署后，API 路径为 /api/process
                    const response = await fetch('/api/process', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text }),
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    resultDiv.innerHTML = data.html;
                    statusDiv.textContent = "点击“开始录音”继续学习！";

                } catch (error) {
                    console.error('Error:', error);
                    resultDiv.innerHTML = `<p style="color: red;">处理失败: ${error.message}</p>`;
                    statusDiv.textContent = '出错了，再试一次吧！';
                }
            }

            function startVolumeVisualization() {
                navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then(stream => {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        analyser = audioContext.createAnalyser();
                        microphone = audioContext.createMediaStreamSource(stream);
                        javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                        analyser.smoothingTimeConstant = 0.8;
                        analyser.fftSize = 1024;

                        microphone.connect(analyser);
                        analyser.connect(javascriptNode);
                        javascriptNode.connect(audioContext.destination);

                        javascriptNode.onaudioprocess = () => {
                            const array = new Uint8Array(analyser.frequencyBinCount);
                            analyser.getByteFrequencyData(array);
                            let values = 0;
                            const length = array.length;
                            for (let i = 0; i < length; i++) {
                                values += (array[i]);
                            }
                            const average = values / length;
                            const volume = Math.min(100, Math.max(0, average * 2)); // Scale volume
                            volumeVisualizer.style.transform = `scaleX(${volume / 100})`;
                        }
                    }).catch(err => {
                        console.error("无法获取麦克风权限:", err);
                        statusDiv.textContent = "需要麦克风权限才能使用哦！";
                    });
            }

            function stopVolumeVisualization() {
                if (javascriptNode) javascriptNode.disconnect();
                if (analyser) analyser.disconnect();
                if (microphone) microphone.disconnect();
                if (audioContext) audioContext.close();
                volumeVisualizer.style.transform = 'scaleX(0)';
            }
        }
    </script>
</body>
</html>
